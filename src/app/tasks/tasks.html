@if(isAdding()) {
  <app-new-task  [userId]="userId"  (close)="onClickClose()"  />
}
<section id="tasks">
  <header>
    <h2>{{ name }}'s Tasks</h2>
    <menu>
      <Button (click)="openTaskAdder()">Add Task</Button>
    </menu>
  </header>
    @if (tasks) {
      <ul>
        @for (task of filterTasks; track task.id) {
          <li>
            <app-task [tasks]="task" />
          </li>
        }
      </ul>
    }
</section>
